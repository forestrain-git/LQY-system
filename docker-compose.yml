# 龙泉驿环卫智能体 - Docker部署配置
# LQY Sanitation Intelligence System - Docker Compose

version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: lqy-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lqy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lqy_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-lqy_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lqy_user} -d ${POSTGRES_DB:-lqy_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lqy-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: lqy-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lqy-network

  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:5.4.0
    container_name: lqy-emqx
    environment:
      - EMQX_NODE_NAME=emqx@127.0.0.1
      - EMQX_NODE_COOKIE=${EMQX_COOKIE:-emqxsecretcookie}
    ports:
      - "1885:1883"      # MQTT端口
      - "8085:8083"      # MQTT WebSocket
      - "18085:18083"    # EMQX Dashboard
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx_ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lqy-network

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lqy-backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://lqy_user:lqy_password_123@db:5432/lqy_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MQTT_BROKER=emqx
      - MQTT_PORT=1883
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        sleep 3 &&
        echo '运行数据库迁移...' &&
        alembic upgrade head || echo '迁移可能已完成' &&
        echo '启动后端服务...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    networks:
      - lqy-network

  # 前端Web服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lqy-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=/api/v1
      - VITE_WS_URL=/ws
    depends_on:
      - backend
    networks:
      - lqy-network

volumes:
  postgres_data:
  redis_data:
  emqx_data:
  backend_logs:

networks:
  lqy-network:
    driver: bridge
